<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoshoot Magic</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-card: rgba(255,255,255,0.04);
            --fg: #f0ece4;
            --fg-muted: #8a8578;
            --accent: #e8a838;
            --accent-glow: rgba(232,168,56,0.35);
            --border: rgba(255,255,255,0.08);
            --danger: #e84848;
            --success: #38c878;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body.effects-lite .bg-atmosphere,
        body.effects-lite .noise-overlay {
            display: none;
        }

        /* === LATAR BELAKANG ATMOSFERIK === */
        .bg-atmosphere {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .bg-atmosphere::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -20%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(232,168,56,0.08) 0%, transparent 70%);
            animation: floatBlob 18s ease-in-out infinite alternate;
        }
        .bg-atmosphere::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -15%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(232,80,56,0.06) 0%, transparent 70%);
            animation: floatBlob 22s ease-in-out infinite alternate-reverse;
        }
        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.15); }
        }

        /* === NOISE TEXTURE === */
        .noise-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px;
        }

        .main-content {
            position: relative;
            z-index: 2;
        }

        /* === HEADER === */
        .site-header {
            padding: 2rem 0 1rem;
            text-align: center;
        }
        .site-header h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: -0.02em;
            color: var(--fg);
            margin-bottom: 0.3rem;
        }
        .site-header h1 span {
            color: var(--accent);
        }
        .site-header p {
            color: var(--fg-muted);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* === KARTU GLASS === */
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.5rem;
            transition: border-color 0.3s;
        }
        .glass-card:hover {
            border-color: rgba(255,255,255,0.12);
        }
        body.effects-lite .glass-card,
        body.effects-lite .cam-status,
        body.effects-lite .result-item .shot-badge,
        body.effects-lite .result-item .dl-btn,
        body.effects-lite .custom-toast,
        body.effects-lite .lightbox {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        /* === PILIHAN PERSON === */
        .person-option {
            position: relative;
            cursor: pointer;
            padding: 1.2rem 1rem;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: transparent;
            text-align: center;
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
            overflow: hidden;
        }
        .person-option::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
            opacity: 0;
            transition: opacity 0.35s;
        }
        .person-option:hover {
            border-color: rgba(232,168,56,0.3);
            transform: translateY(-2px);
        }
        .person-option.active {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow), inset 0 0 20px rgba(232,168,56,0.05);
        }
        .person-option.active::before {
            opacity: 1;
        }
        .person-option .opt-icon {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
            position: relative;
            z-index: 1;
            transition: transform 0.35s;
        }
        .person-option.active .opt-icon {
            transform: scale(1.15);
        }
        .person-option .opt-label {
            font-weight: 700;
            font-size: 0.9rem;
            position: relative;
            z-index: 1;
            color: var(--fg);
        }
        .person-option .opt-desc {
            font-size: 0.75rem;
            color: var(--fg-muted);
            margin-top: 0.2rem;
            position: relative;
            z-index: 1;
        }
        .person-option input[type="radio"] {
            display: none;
        }

        /* === KAMERA PREVIEW === */
        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            border-radius: 14px;
            overflow: hidden;
            background: #111;
            border: 2px solid var(--border);
        }
        .camera-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            /* Counter browser/device selfie mirroring so preview feels natural. */
            transform: scaleX(-1);
            transform-origin: center;
        }
        .camera-wrapper .cam-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        /* Corner brackets */
        .cam-corner {
            position: absolute;
            width: 28px;
            height: 28px;
            border-color: var(--accent);
            border-style: solid;
            border-width: 0;
            opacity: 0.7;
        }
        .cam-corner.tl { top: 12px; left: 12px; border-top-width: 3px; border-left-width: 3px; border-radius: 4px 0 0 0; }
        .cam-corner.tr { top: 12px; right: 12px; border-top-width: 3px; border-right-width: 3px; border-radius: 0 4px 0 0; }
        .cam-corner.bl { bottom: 12px; left: 12px; border-bottom-width: 3px; border-left-width: 3px; border-radius: 0 0 0 4px; }
        .cam-corner.br { bottom: 12px; right: 12px; border-bottom-width: 3px; border-right-width: 3px; border-radius: 0 0 4px 0; }

        .cam-status {
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .cam-status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--danger);
            animation: blink 1.2s infinite;
        }
        .cam-status.live .dot {
            background: var(--success);
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Placeholder kamera mati */
        .cam-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            color: var(--fg-muted);
        }
        .cam-placeholder i {
            font-size: 2.5rem;
            opacity: 0.4;
        }
        .cam-placeholder span {
            font-size: 0.85rem;
        }

        /* === HITUNG MUNDUR OVERLAY === */
        .countdown-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .countdown-overlay.show {
            opacity: 1;
        }
        .countdown-number {
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 60px var(--accent-glow), 0 0 120px var(--accent-glow);
            animation: countPulse 1s ease-in-out;
        }
        @keyframes countPulse {
            0% { transform: scale(0.5); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .flash-overlay {
            position: absolute;
            inset: 0;
            background: white;
            z-index: 11;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.08s;
        }
        .flash-overlay.flash {
            opacity: 0.85;
        }

        /* === TOMBOL === */
        .btn-shoot {
            background: linear-gradient(135deg, var(--accent), #d4922e);
            color: #0a0a0f;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 0.85rem 2.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 4px 24px var(--accent-glow);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }
        .btn-shoot:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 40px var(--accent-glow);
        }
        .btn-shoot:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }
        .btn-shoot:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-outline-custom {
            background: transparent;
            color: var(--fg);
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.7rem 1.8rem;
            border: 1.5px solid var(--border);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-outline-custom:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(232,168,56,0.06);
        }

        /* === JUMLAH SHOT SELECTOR === */
        .shot-selector {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: center;
        }
        .shot-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--fg);
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
        }
        .shot-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .shot-count {
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 2.5rem;
            text-align: center;
            color: var(--accent);
        }

        /* === GALERI HASIL === */
        .result-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .result-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            aspect-ratio: 4/3;
            background: #111;
            animation: fadeSlideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
            contain: content;
            content-visibility: auto;
        }
        @keyframes fadeSlideIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .result-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s;
        }
        .result-item:hover img {
            transform: scale(1.05);
        }
        .result-item .shot-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
        }
        .result-item .dl-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--fg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s;
            font-size: 0.8rem;
        }
        .result-item:hover .dl-btn {
            opacity: 1;
        }
        .result-item .dl-btn:hover {
            background: var(--accent);
            color: #0a0a0f;
        }

        /* === EMPTY STATE === */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--fg-muted);
        }
        .empty-state i {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 1rem;
        }
        .empty-state p {
            font-size: 0.9rem;
        }

        /* === SECTION LABEL === */
        .section-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--fg-muted);
            margin-bottom: 0.8rem;
        }

        /* === PROGRESS BAR SHOOTING === */
        .shoot-progress {
            height: 3px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 1rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .shoot-progress.active {
            opacity: 1;
        }
        .shoot-progress .bar {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0%;
            transition: width 0.4s ease;
        }

        /* === TOAST === */
        .custom-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20,20,28,0.92);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: var(--fg);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .custom-toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .custom-toast i {
            color: var(--accent);
        }

        /* === LIGHTBOX === */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 8000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
        }
        .lightbox.open {
            opacity: 1;
            pointer-events: auto;
        }
        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .lightbox.open img {
            transform: scale(1);
        }
        .lightbox .close-lb {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--fg);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
        }
        .lightbox .close-lb:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* === RESPONSIVE === */
        @media (max-width: 768px) {
            .result-gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }
            .camera-wrapper {
                aspect-ratio: 3/4;
            }
            .glass-card {
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

    <!-- Atmosfer latar -->
    <div class="bg-atmosphere"></div>
    <div class="noise-overlay"></div>

    <!-- Toast -->
    <div class="custom-toast" id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMsg"></span>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="close-lb" onclick="closeLightbox()" aria-label="Tutup"><i class="fas fa-times"></i></button>
        <img src="" alt="Preview" id="lbImg">
    </div>

    <div class="main-content">
        <!-- Header -->
        <header class="site-header">
            <div class="container">
                <h1>Photoshoot <span>Magic</span></h1>
                <p>Pilih kategori, ambil pose, dan biarkan keajaiban terjadi</p>
            </div>
        </header>

        <main class="container pb-5">
            <div class="row g-4">

                <!-- KOLOM KIRI: Kontrol -->
                <div class="col-lg-4">
                    <!-- Pilih Jumlah Orang -->
                    <div class="glass-card mb-3">
                        <div class="section-label"><i class="fas fa-users me-1"></i> Kategori</div>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="person-option active" data-folder="one-person">
                                    <input type="radio" name="personType" value="one-person" checked>
                                    <span class="opt-icon"><i class="fas fa-user"></i></span>
                                    <span class="opt-label">Solo</span>
                                    <span class="opt-desc">1 orang</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="person-option" data-folder="duo-person">
                                    <input type="radio" name="personType" value="duo-person">
                                    <span class="opt-icon"><i class="fas fa-user-friends"></i></span>
                                    <span class="opt-label">Duo</span>
                                    <span class="opt-desc">2 orang</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="person-option" data-folder="trio-person">
                                    <input type="radio" name="personType" value="trio-person">
                                    <span class="opt-icon"><i class="fas fa-users"></i></span>
                                    <span class="opt-label">Trio</span>
                                    <span class="opt-desc">3 orang</span>
                                </label>
                            </div>
                            <div class="col-6">
                                <label class="person-option" data-folder="group-person">
                                    <input type="radio" name="personType" value="group-person">
                                    <span class="opt-icon"><i class="fas fa-people-group"></i></span>
                                    <span class="opt-label">Group</span>
                                    <span class="opt-desc">4+ orang</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Jumlah Shot -->
                    <div class="glass-card mb-3">
                        <div class="section-label"><i class="fas fa-camera me-1"></i> Jumlah Foto</div>
                        <div class="shot-selector">
                            <button class="shot-btn" id="shotMinus" aria-label="Kurangi"><i class="fas fa-minus"></i></button>
                            <span class="shot-count" id="shotCount">3</span>
                            <button class="shot-btn" id="shotPlus" aria-label="Tambah"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="shoot-progress" id="shootProgress">
                            <div class="bar" id="shootBar"></div>
                        </div>
                    </div>

                    <!-- Tombol Aksi -->
                    <div class="d-flex flex-column gap-2">
                        <button class="btn-shoot w-100" id="btnShoot" disabled>
                            <i class="fas fa-bolt"></i> Mulai Photoshoot
                        </button>
                        <button class="btn-outline-custom w-100" id="btnReset">
                            <i class="fas fa-rotate-right"></i> Reset Hasil
                        </button>
                    </div>
                </div>

                <!-- KOLOM KANAN: Kamera + Hasil -->
                <div class="col-lg-8">
                    <!-- Preview Kamera -->
                    <div class="glass-card mb-3" style="padding:1rem;">
                        <div class="camera-wrapper" id="cameraWrapper">
                            <video id="camVideo" autoplay playsinline muted></video>
                            <div class="cam-placeholder" id="camPlaceholder">
                                <i class="fas fa-video-slash"></i>
                                <span>Kamera belum aktif</span>
                            </div>
                            <div class="cam-overlay">
                                <div class="cam-corner tl"></div>
                                <div class="cam-corner tr"></div>
                                <div class="cam-corner bl"></div>
                                <div class="cam-corner br"></div>
                            </div>
                            <div class="cam-status" id="camStatus">
                                <div class="dot"></div>
                                <span>Offline</span>
                            </div>
                            <!-- Hitung mundur -->
                            <div class="countdown-overlay" id="countdownOverlay">
                                <span class="countdown-number" id="countdownNum">3</span>
                            </div>
                            <!-- Flash -->
                            <div class="flash-overlay" id="flashOverlay"></div>
                        </div>
                    </div>

                    <!-- Galeri Hasil -->
                    <div class="glass-card">
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <div class="section-label mb-0"><i class="fas fa-sparkles me-1"></i> Hasil Foto</div>
                            <span style="font-size:0.75rem; color:var(--fg-muted);" id="resultCount">0 foto</span>
                        </div>
                        <div id="resultContainer">
                            <div class="empty-state">
                                <i class="fas fa-camera-retro d-block"></i>
                                <p>Belum ada foto. Pilih kategori dan mulai photoshoot.</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Hidden canvas untuk capture (tidak ditampilkan) -->
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <script>
        // ============================
        // STATE & KONFIGURASI
        // ============================
        let selectedFolder = 'one-person';
        let shotTotal = 3;
        let isShooting = false;
        let cameraStream = null;
        let availableImages = []; // daftar path gambar di folder terpilih
        let resultImages = [];   // gambar yang sudah "difoto"
        let usedImageIndices = new Set(); // index yang sudah dipakai (untuk random tanpa repeat)
        const folderImageManifest = {
            'one-person': [
                'images/one-person/photo1.webp',
                'images/one-person/photo2.webp',
                'images/one-person/photo3.webp',
                'images/one-person/photo4.webp',
                'images/one-person/photo5.webp',
                'images/one-person/photo6.webp',
                'images/one-person/photo7.webp'
            ],
            'duo-person': [
                'images/duo-person/photo1.webp',
                'images/duo-person/photo2.webp',
                'images/duo-person/photo3.webp',
                'images/duo-person/photo4.webp',
                'images/duo-person/phoyo5.webp'
            ],
            'trio-person': [
                'images/trio-person/photo-1.webp',
                'images/trio-person/photo2.webp',
                'images/trio-person/photo3.webp',
                'images/trio-person/photo4.webp'
            ],
            'group-person': [
                'images/group-person/photo1.webp',
                'images/group-person/photo2.webp',
                'images/group-person/photo3.webp',
                'images/group-person/photo4.webp'
            ]
        };

        // Elemen DOM
        const video = document.getElementById('camVideo');
        const camPlaceholder = document.getElementById('camPlaceholder');
        const camStatus = document.getElementById('camStatus');
        const countdownOverlay = document.getElementById('countdownOverlay');
        const countdownNum = document.getElementById('countdownNum');
        const flashOverlay = document.getElementById('flashOverlay');
        const btnShoot = document.getElementById('btnShoot');
        const btnReset = document.getElementById('btnReset');
        const shotCountEl = document.getElementById('shotCount');
        const shootProgress = document.getElementById('shootProgress');
        const shootBar = document.getElementById('shootBar');
        const resultContainer = document.getElementById('resultContainer');
        const resultCountEl = document.getElementById('resultCount');

        // ============================
        // INISIALISASI KAMERA
        // ============================
        async function initCamera() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 960, max: 1280 },
                        height: { ideal: 720, max: 960 },
                        frameRate: { ideal: 24, max: 30 }
                    },
                    audio: false
                });
                video.srcObject = cameraStream;
                camPlaceholder.style.display = 'none';
                camStatus.classList.add('live');
                camStatus.querySelector('span').textContent = 'Live';
                updateImageInfo();
                showToast('Kamera aktif dan siap digunakan');
            } catch (err) {
                console.error('Gagal akses kamera:', err);
                camPlaceholder.querySelector('span').textContent = 'Gagal mengakses kamera';
                updateImageInfo();
                showToast('Tidak bisa mengakses kamera. Pastikan izin diberikan.');
            }
        }

        // ============================
        // LOAD GAMBAR DARI FOLDER
        // ============================
        function getImagePathsFromFolder(folder) {
            if (folderImageManifest[folder]) {
                return [...folderImageManifest[folder]];
            }

            // Karena browser tidak bisa membaca direktori secara langsung,
            // kita coba load gambar dengan pola nama umum.
            // User perlu menamai file: photo1.jpg, photo2.jpg, photo3.png, dst.
            const extensions = ['webp', 'jpg', 'jpeg', 'png', 'WEBP', 'JPG', 'JPEG', 'PNG'];
            const paths = [];
            // Fallback dibatasi agar tidak membebani browser.
            for (let i = 1; i <= 12; i++) {
                for (const ext of extensions) {
                    paths.push(`images/${folder}/photo${i}.${ext}`);
                }
            }
            return paths;
        }

        // Preload & cek gambar mana yang exist
        async function checkAvailableImages(folder) {
            const candidates = getImagePathsFromFolder(folder);
            availableImages = [];
            usedImageIndices = new Set();

            if (folderImageManifest[folder]) {
                availableImages = candidates;
                updateImageInfo();
                return availableImages.length;
            }

            const checks = candidates.map((path, idx) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.decoding = 'async';
                    img.onload = () => resolve({ path, exist: true, idx });
                    img.onerror = () => resolve({ path, exist: false, idx });
                    img.src = path;
                });
            });

            const results = await Promise.all(checks);
            results.forEach(r => {
                if (r.exist) availableImages.push(r.path);
            });

            updateImageInfo();
            return availableImages.length;
        }

        function updateImageInfo() {
            btnShoot.disabled = availableImages.length === 0 || !cameraStream;
        }

        function scheduleCameraInit() {
            const run = () => initCamera();
            if ('requestIdleCallback' in window) {
                window.requestIdleCallback(run, { timeout: 1200 });
            } else {
                setTimeout(run, 150);
            }
        }

        // ============================
        // PILIHAN PERSON
        // ============================
        document.querySelectorAll('.person-option').forEach(opt => {
            opt.addEventListener('click', async () => {
                if (isShooting) return;
                document.querySelectorAll('.person-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                selectedFolder = opt.dataset.folder;
                await checkAvailableImages(selectedFolder);
            });
        });

        // ============================
        // JUMLAH SHOT
        // ============================
        document.getElementById('shotMinus').addEventListener('click', () => {
            if (isShooting) return;
            shotTotal = Math.max(1, shotTotal - 1);
            shotCountEl.textContent = shotTotal;
        });
        document.getElementById('shotPlus').addEventListener('click', () => {
            if (isShooting) return;
            shotTotal = Math.min(10, shotTotal + 1);
            shotCountEl.textContent = shotTotal;
        });

        // ============================
        // PROSES PHOTOSHOOT
        // ============================
        btnShoot.addEventListener('click', startPhotoshoot);

        async function startPhotoshoot() {
            if (isShooting) return;
            if (availableImages.length === 0) {
                showToast('Tidak ada gambar di folder yang dipilih!');
                return;
            }
            if (shotTotal > availableImages.length) {
                showToast(`Hanya ${availableImages.length} gambar tersedia, kurangi jumlah foto.`);
                return;
            }

            isShooting = true;
            btnShoot.disabled = true;
            btnShoot.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memotret...';
            shootProgress.classList.add('active');
            shootBar.style.width = '0%';
            resultImages = [];
            usedImageIndices = new Set();

            for (let i = 0; i < shotTotal; i++) {
                // Hitung mundur 3 detik
                await countdown(3);

                // Flash effect
                await doFlash();

                // Ambil gambar random dari folder
                const imgPath = pickRandomImage();
                if (imgPath) {
                    resultImages.push(imgPath);
                }

                // Update progress
                const pct = ((i + 1) / shotTotal) * 100;
                shootBar.style.width = pct + '%';

                // Jeda antar shot
                if (i < shotTotal - 1) {
                    await delay(600);
                }
            }

            // Selesai
            isShooting = false;
            btnShoot.disabled = false;
            btnShoot.innerHTML = '<i class="fas fa-bolt"></i> Mulai Photoshoot';
            setTimeout(() => {
                shootProgress.classList.remove('active');
                shootBar.style.width = '0%';
            }, 800);

            renderResults();
            showToast(`${resultImages.length} foto berhasil diambil!`);
        }

        function pickRandomImage() {
            // Ambil index yang belum dipakai
            const available = [];
            for (let i = 0; i < availableImages.length; i++) {
                if (!usedImageIndices.has(i)) available.push(i);
            }
            if (available.length === 0) return availableImages[0];
            const pick = available[Math.floor(Math.random() * available.length)];
            usedImageIndices.add(pick);
            return availableImages[pick];
        }

        function countdown(seconds) {
            return new Promise((resolve) => {
                let count = seconds;
                countdownOverlay.classList.add('show');
                countdownNum.textContent = count;
                countdownNum.style.animation = 'none';
                void countdownNum.offsetWidth; // reflow
                countdownNum.style.animation = 'countPulse 1s ease-in-out';

                const interval = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(interval);
                        countdownOverlay.classList.remove('show');
                        resolve();
                    } else {
                        countdownNum.textContent = count;
                        countdownNum.style.animation = 'none';
                        void countdownNum.offsetWidth;
                        countdownNum.style.animation = 'countPulse 1s ease-in-out';
                    }
                }, 1000);
            });
        }

        function doFlash() {
            return new Promise((resolve) => {
                flashOverlay.classList.add('flash');
                setTimeout(() => {
                    flashOverlay.classList.remove('flash');
                    setTimeout(resolve, 150);
                }, 120);
            });
        }

        function delay(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        // ============================
        // RENDER HASIL
        // ============================
        function renderResults() {
            if (resultImages.length === 0) {
                resultContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-camera-retro d-block"></i>
                        <p>Belum ada foto. Pilih kategori dan mulai photoshoot.</p>
                    </div>`;
                resultCountEl.textContent = '0 foto';
                return;
            }

            resultCountEl.textContent = `${resultImages.length} foto`;
            resultContainer.innerHTML = '';

            const gallery = document.createElement('div');
            gallery.className = 'result-gallery';

            resultImages.forEach((src, i) => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.style.animationDelay = `${i * 0.12}s`;

                const img = document.createElement('img');
                img.src = src;
                img.alt = `Foto ${i + 1}`;
                img.loading = 'lazy';
                img.decoding = 'async';
                img.addEventListener('click', () => openLightbox(src));
                img.addEventListener('error', () => {
                    item.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;height:100%;color:var(--fg-muted);font-size:0.75rem;'>Gambar tidak ditemukan</div>";
                });

                const badge = document.createElement('span');
                badge.className = 'shot-badge';
                badge.textContent = `Shot ${i + 1}`;

                const download = document.createElement('a');
                download.href = src;
                download.download = '';
                download.className = 'dl-btn';
                download.title = 'Download';
                download.setAttribute('aria-label', 'Download foto');
                download.innerHTML = '<i class="fas fa-download"></i>';

                item.appendChild(img);
                item.appendChild(badge);
                item.appendChild(download);
                gallery.appendChild(item);
            });

            resultContainer.appendChild(gallery);
        }

        // ============================
        // RESET
        // ============================
        btnReset.addEventListener('click', () => {
            if (isShooting) return;
            resultImages = [];
            usedImageIndices = new Set();
            renderResults();
            showToast('Hasil foto direset');
        });

        // ============================
        // LIGHTBOX
        // ============================
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lbImg');
            img.src = src;
            lb.classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.remove('open');
            document.body.style.overflow = '';
        }
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeLightbox();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // ============================
        // TOAST
        // ============================
        let toastTimer = null;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            toastMsg.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function shouldUseLiteEffects() {
            const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const lowMemory = typeof navigator.deviceMemory === 'number' && navigator.deviceMemory <= 4;
            const lowCpu = typeof navigator.hardwareConcurrency === 'number' && navigator.hardwareConcurrency <= 4;
            const smallScreen = window.innerWidth <= 768;
            return reducedMotion || lowMemory || lowCpu || smallScreen;
        }

        // ============================
        // MULAI
        // ============================
        (async function init() {
            if (shouldUseLiteEffects()) {
                document.body.classList.add('effects-lite');
            }
            await checkAvailableImages(selectedFolder);
            scheduleCameraInit();
        })();
    </script>
</body>
</html>
